<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍼 宝宝真实大小 — B超尺寸可视化</title>
<style>
  :root {
    --pink: #FF6B9D;
    --pink-light: #FFF0F5;
    --blue: #7EC8E3;
    --blue-light: #E8F6FD;
    --bg: #FFF8FA;
    --text: #3D3D3D;
    --text-light: #888;
    --card-bg: #FFFFFF;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .header {
    text-align: center;
    padding: 40px 20px 20px;
    background: linear-gradient(135deg, var(--pink-light), var(--blue-light));
  }
  .header h1 {
    font-size: 28px;
    background: linear-gradient(135deg, var(--pink), #E876A0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .header p { color: var(--text-light); font-size: 15px; }

  .form-section {
    max-width: 520px;
    margin: 24px auto;
    padding: 0 16px;
  }
  .form-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
  }
  .form-card h2 { font-size: 18px; margin-bottom: 16px; color: var(--pink); }

  .input-group { margin-bottom: 14px; }
  .input-group label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .input-group label .unit { color: var(--text-light); font-weight: normal; font-size: 12px; }
  .input-group label .full-name { color: var(--text-light); font-weight: normal; font-size: 12px; margin-left: 4px; }
  .input-group input {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #F0F0F0;
    border-radius: 10px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: var(--pink); }
  .input-group input::placeholder { color: #CCC; }

  .calc-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--pink), #E876A0);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .calc-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,107,157,0.35); }

  .presets { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  .preset-btn {
    padding: 6px 12px;
    background: #F8F8F8;
    border: 1px solid #EEE;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-light);
    transition: all 0.2s;
  }
  .preset-btn:hover { background: var(--pink-light); color: var(--pink); border-color: var(--pink); }

  .result-section { max-width: 520px; margin: 0 auto; padding: 0 16px; display: none; }
  .result-section.show { display: block; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .info-card {
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 16px;
    text-align: center;
  }
  .info-card .emoji { font-size: 28px; margin-bottom: 6px; }
  .info-card .value { font-size: 20px; font-weight: 700; color: var(--pink); }
  .info-card .label { font-size: 12px; color: var(--text-light); margin-top: 2px; }

  .comparison-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
    text-align: center;
    margin-bottom: 16px;
  }
  .comparison-card .fruit-emoji { font-size: 64px; margin: 12px 0; animation: bounce 2s infinite; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .comparison-card .message { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
  .comparison-card .sub-msg { font-size: 14px; color: var(--text-light); }

  /* Fetus Image Card */
  .fetus-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    text-align: center;
    margin-bottom: 16px;
  }
  .fetus-card h3 { font-size: 16px; color: var(--pink); margin-bottom: 12px; }
  .fetus-img-wrap {
    display: inline-block;
    background: #FAFAFA;
    border-radius: 12px;
    padding: 12px;
    position: relative;
  }
  .fetus-img-wrap img {
    max-width: 280px;
    max-height: 280px;
    border-radius: 8px;
    display: block;
  }

  /* Real-size ruler on screen */
  .ruler-info {
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-light);
  }

  /* A4 Print Card */
  .a4-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 16px;
  }
  .a4-card h3 { font-size: 16px; color: var(--pink); margin-bottom: 12px; text-align: center; }

  .a4-preview {
    background: white;
    border: 2px dashed #E0E0E0;
    border-radius: 8px;
    padding: 20mm;
    min-height: 260mm;
    position: relative;
    font-family: 'PingFang SC', 'Noto Sans SC', sans-serif;
  }
  .a4-header {
    text-align: center;
    border-bottom: 2px solid var(--pink);
    padding-bottom: 12px;
    margin-bottom: 20px;
  }
  .a4-header h2 {
    font-size: 22px;
    color: var(--pink);
    -webkit-text-fill-color: var(--pink);
  }
  .a4-header .a4-sub {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 4px;
  }

  .a4-body {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
  }

  /* Left: fetus image with real-size ruler */
  .a4-left {
    flex: 0 0 auto;
    position: relative;
  }
  .a4-fetus-img {
    max-width: 200px;
    max-height: 200px;
    border-radius: 8px;
  }

  /* Real ruler beside image */
  .a4-ruler {
    position: absolute;
    top: 0;
    left: -28px;
    width: 22px;
    height: 200px;
    border-right: 1.5px solid #666;
  }
  .a4-ruler .cm-mark {
    position: absolute;
    left: 0;
    width: 100%;
    border-top: 1px solid #999;
    font-size: 7px;
    color: #666;
    line-height: 1;
  }
  .a4-ruler .cm-mark .cm-label {
    position: absolute;
    left: -2px;
    top: -7px;
    font-size: 7px;
    color: #666;
    transform: translateX(-100%);
    padding-right: 2px;
  }

  /* Right: data */
  .a4-right {
    flex: 1;
  }
  .a4-stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .a4-stat {
    background: #FFF5F8;
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .a4-stat .s-val {
    font-size: 18px;
    font-weight: 700;
    color: var(--pink);
  }
  .a4-stat .s-lbl {
    font-size: 11px;
    color: var(--text-light);
  }

  .a4-compare {
    text-align: center;
    padding: 12px;
    background: #FFF8FA;
    border-radius: 10px;
    margin-bottom: 12px;
  }
  .a4-compare .c-fruit { font-size: 40px; }
  .a4-compare .c-text { font-size: 15px; font-weight: 600; margin-top: 4px; }

  .a4-dev {
    padding: 12px;
    background: #F5FAFF;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.7;
    color: #555;
  }
  .a4-dev h4 { font-size: 13px; color: var(--blue); margin-bottom: 4px; }

  .a4-footer {
    text-align: center;
    margin-top: 20px;
    padding-top: 12px;
    border-top: 1px solid #EEE;
    font-size: 10px;
    color: #CCC;
  }

  /* Full-width size bar at bottom of A4 */
  .a4-size-bar {
    margin-top: 16px;
    text-align: center;
  }
  .a4-size-bar .size-label {
    font-size: 12px;
    color: var(--text-light);
    margin-bottom: 4px;
  }
  .a4-size-bar canvas {
    display: block;
    margin: 0 auto;
  }

  /* Action buttons */
  .action-btns { display: flex; gap: 12px; margin-top: 12px; }
  .action-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .action-btn:hover { transform: translateY(-1px); }
  .btn-download { background: linear-gradient(135deg, var(--pink), #E876A0); color: white; }
  .btn-print { background: var(--card-bg); color: var(--pink); border: 2px solid var(--pink) !important; }

  .footer { text-align: center; padding: 24px; font-size: 12px; color: #CCC; }

  /* Print styles */
  @media print {
    body { background: white !important; padding: 0 !important; margin: 0 !important; }
    .header, .form-section, .result-section > *:not(#a4PrintCard), .action-btns, .footer { display: none !important; }
    .result-section.show { display: block !important; }
    #a4PrintCard { box-shadow: none !important; padding: 0 !important; margin: 0 !important; }
    .a4-preview {
      border: none !important;
      padding: 15mm !important;
      min-height: auto !important;
      margin: 0 !important;
    }
    .no-print { display: none !important; }
    .a4-header h2, .a4-stat .s-val { -webkit-text-fill-color: var(--pink) !important; color: var(--pink) !important; }
    @page { size: A4; margin: 0; }
  }

  @media (max-width: 480px) {
    .header h1 { font-size: 22px; }
    .a4-body { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🍼 宝宝真实大小</h1>
  <p>输入 B 超数据，看看你的宝宝有多大啦</p>
</div>

<div class="form-section">
  <div class="form-card">
    <h2>📋 B 超数据输入</h2>

    <div class="input-group">
      <label><span>双顶径 (BPD) <span class="full-name">胎头最宽</span></span><span class="unit">cm</span></label>
      <input type="number" id="bpd" placeholder="例如：5.0" step="0.1" min="1" max="12">
    </div>
    <div class="input-group">
      <label><span>头围 (HC) <span class="full-name">可选</span></span><span class="unit">cm</span></label>
      <input type="number" id="hc" placeholder="例如：18.0" step="0.1" min="5" max="40">
    </div>
    <div class="input-group">
      <label><span>腹围 (AC) <span class="full-name">可选</span></span><span class="unit">cm</span></label>
      <input type="number" id="ac" placeholder="例如：15.0" step="0.1" min="5" max="40">
    </div>
    <div class="input-group">
      <label><span>股骨长 (FL) <span class="full-name">大腿骨</span></span><span class="unit">cm</span></label>
      <input type="number" id="fl" placeholder="例如：3.5" step="0.1" min="0.5" max="10">
    </div>

    <button class="calc-btn" onclick="calculate()">🦞 看看宝宝有多大</button>

    <div class="presets">
      <span style="font-size:12px;color:#BBB;line-height:28px;">快速：</span>
      <button class="preset-btn" onclick="fillPreset(12)">12周</button>
      <button class="preset-btn" onclick="fillPreset(16)">16周</button>
      <button class="preset-btn" onclick="fillPreset(20)">20周</button>
      <button class="preset-btn" onclick="fillPreset(24)">24周</button>
      <button class="preset-btn" onclick="fillPreset(28)">28周</button>
      <button class="preset-btn" onclick="fillPreset(32)">32周</button>
      <button class="preset-btn" onclick="fillPreset(36)">36周</button>
      <button class="preset-btn" onclick="fillPreset(40)">40周</button>
    </div>
  </div>
</div>

<div class="result-section" id="resultSection">
  <div class="info-grid" id="infoGrid"></div>
  <div class="comparison-card" id="comparisonCard"></div>

  <!-- Fetus Image -->
  <div class="fetus-card">
    <h3>🎨 宝宝真实照片</h3>
    <div class="fetus-img-wrap">
      <img id="fetusImg" src="" alt="宝宝">
    </div>
    <div class="ruler-info" id="rulerInfo"></div>
  </div>

  <!-- A4 Print Area -->
  <div class="a4-card" id="a4PrintCard">
    <h3>📄 A4 打印预览</h3>
    <div class="a4-preview" id="a4Preview"></div>
  </div>

  <div class="form-section">
    <div class="action-btns no-print">
      <button class="action-btn btn-download" onclick="downloadA4()">⬇️ 下载图片</button>
      <button class="action-btn btn-print" onclick="window.print()">🖨️ 打印 A4</button>
    </div>
  </div>
</div>

<div class="footer">🦞 宝宝真实大小 · 数据仅供参考 · 请以医生诊断为准</div>

<script>

  { week: 26, bpd: 6.6, hc: 23.3, ac: 21.0, fl: 4.9,  length: 34,   weight: 800 },
  { week: 27, bpd: 6.8, hc: 24.0, ac: 21.8, fl: 5.2,  length: 35,   weight: 950 },
  { week: 28, bpd: 7.1, hc: 25.0, ac: 22.8, fl: 5.4,  length: 37,   weight: 1100 },
  { week: 29, bpd: 7.3, hc: 25.8, ac: 23.6, fl: 5.6,  length: 38,   weight: 1250 },
  { week: 30, bpd: 7.6, hc: 26.6, ac: 24.5, fl: 5.8,  length: 39,   weight: 1400 },
  { week: 31, bpd: 7.8, hc: 27.3, ac: 25.3, fl: 6.0,  length: 40,   weight: 1600 },
  { week: 32, bpd: 8.0, hc: 28.0, ac: 26.0, fl: 6.2,  length: 42,   weight: 1800 },
  { week: 33, bpd: 8.2, hc: 28.7, ac: 26.8, fl: 6.4,  length: 43,   weight: 2000 },
  { week: 34, bpd: 8.5, hc: 29.5, ac: 27.5, fl: 6.6,  length: 44,   weight: 2250 },
  { week: 35, bpd: 8.7, hc: 30.2, ac: 28.2, fl: 6.7,  length: 45,   weight: 2500 },
  { week: 36, bpd: 8.8, hc: 30.7, ac: 29.0, fl: 6.9,  length: 47,   weight: 2700 },
  { week: 37, bpd: 9.0, hc: 31.2, ac: 29.8, fl: 7.1,  length: 48,   weight: 2950 },
  { week: 38, bpd: 9.2, hc: 31.7, ac: 30.5, fl: 7.2,  length: 49,   weight: 3100 },

  { week: 40, bpd: 9.5, hc: 32.8, ac: 32.0, fl: 7.5,  length: 51,   weight: 3400 },
];

// ====== AI fetus images for different gestational age ranges ======
const FETUS_IMAGES = [
  { maxWeek: 16, src: 'images/fetus_12w.png', desc: '孕早期胎儿' },
  { maxWeek: 24, src: 'images/fetus_20w.png', desc: '孕中期胎儿' },
  { maxWeek: 32, src: 'images/fetus_28w.png', desc: '孕晚期胎儿' },

// ====== Comparison objects ======
const COMPARISONS = [
  { maxLen: 2,   emoji: '🫘', name: '一颗小豆子', msg: '宝宝还是一颗小豆子呢～' },
  { maxLen: 3,   emoji: '🫐', name: '一颗蓝莓', msg: '你的宝宝像一颗蓝莓那么大！' },

  { maxLen: 10,  emoji: '🥝', name: '一个猕猴桃', msg: '你的宝宝像一个猕猴桃！' },

  { maxLen: 99,  emoji: '🎃', name: '一个大南瓜', msg: '你的宝宝已经很大啦！' },

function fillPreset(week) {
  const data = GROWTH_TABLE.find(d => d.week === week);
  if (!data) return;
  document.getElementById('bpd').value = data.bpd;
  document.getElementById('hc').value = data.hc;
  document.getElementById('ac').value = data.ac;
  document.getElementById('fl').value = data.fl;
  calculate();
}

function calculate() {
  const bpd = parseFloat(document.getElementById('bpd').value);
  const hc = parseFloat(document.getElementById('hc').value);
  const ac = parseFloat(document.getElementById('ac').value);
  const fl = parseFloat(document.getElementById('fl').value);

  if (!bpd || bpd <= 0) { alert('请输入双顶径（BPD）！'); return; }

  let result = estimateWeek(bpd, fl, hc, ac);
  let comp = getComparison(result.length);
  let fetusImg = getFetusImage(result.week);

  showResults(result, comp, fetusImg, bpd, hc, ac, fl);
}

function estimateWeek(bpd, fl, hc, ac) {
  let bestDiff = Infinity, bestEntry = GROWTH_TABLE[0];
  for (let entry of GROWTH_TABLE) {
    let diff = Math.abs(entry.bpd - bpd);
    if (diff < bestDiff) { bestDiff = diff; bestEntry = entry; }
  }

  let estimatedWeek = bestEntry.week;
  let idx = GROWTH_TABLE.indexOf(bestEntry);
  if (idx < GROWTH_TABLE.length - 1 && idx > 0) {
    let prev = GROWTH_TABLE[idx - 1];
    let next = GROWTH_TABLE[idx + 1];
    if (bpd > bestEntry.bpd && next) {
      let ratio = (bpd - bestEntry.bpd) / (next.bpd - bestEntry.bpd);
      estimatedWeek = bestEntry.week + ratio;
    } else if (bpd < bestEntry.bpd && prev) {
      let ratio = (bestEntry.bpd - bpd) / (bestEntry.bpd - prev.bpd);
      estimatedWeek = bestEntry.week - ratio;
    }
  }

  let length = bestEntry.length;
  let weight = bestEntry.weight;

  if (fl && fl > 0) {
    let flLength = fl * 7;
    length = Math.round((length + flLength) / 2);
  }

  if (hc && ac && fl) {
    let logWeight = 1.326 + 0.0107 * hc + 0.0438 * ac + 0.158 * fl - 0.00326 * ac * fl;
    weight = Math.round(Math.pow(10, logWeight));
  }

  return { week: bestEntry.week, estimatedWeek, length, weight };
}

function getComparison(length) {
  for (let comp of COMPARISONS) {
    if (length <= comp.maxLen) return comp;
  }
  return COMPARISONS[COMPARISONS.length - 1];
}

function getFetusImage(week) {
  for (let img of FETUS_IMAGES) {
    if (week <= img.maxWeek) return img;
  }
  return FETUS_IMAGES[FETUS_IMAGES.length - 1];
}

// ====== Generate A4 preview with real-size ruler ======

  const displayCm = Math.min(length, 55);

  preview.innerHTML = `
    <div class="a4-header">

          ${ac ? `<div class="a4-stat"><div class="s-val">${ac} cm</div><div class="s-lbl">腹围</div></div>` : ''}
          ${fl ? `<div class="a4-stat"><div class="s-val">${fl} cm</div><div class="s-lbl">股骨长</div></div>` : ''}
        </div>
        <div class="a4-compare">

    </div>
  `;

  // Draw ruler marks on the side ruler
  drawSideRuler(displayCm);

  // Draw horizontal cm ruler at bottom
  drawHorizontalRuler(Math.min(length + 5, 55));
}

function drawSideRuler(maxCm) {
  const ruler = document.getElementById('a4Ruler');
  if (!ruler) return;
  ruler.innerHTML = '';
  for (let i = 0; i <= maxCm; i++) {
    const mark = document.createElement('div');
    mark.className = 'cm-mark';
    mark.style.top = (i * 10) + 'px';
    if (i % 2 === 0) {
      mark.innerHTML = `<span class="cm-label">${i}</span>`;
    }
    ruler.appendChild(mark);
  }
}

function drawHorizontalRuler(maxCm) {
  const canvas = document.getElementById('rulerCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Scale: W pixels = maxCm cm
  const pxPerCm = (W - 20) / maxCm;

  ctx.strokeStyle = '#666';
  ctx.fillStyle = '#666';
  ctx.lineWidth = 1;
  ctx.font = '10px sans-serif';

  // Main line
  ctx.beginPath();
  ctx.moveTo(10, 20);
  ctx.lineTo(10 + maxCm * pxPerCm, 20);
  ctx.stroke();

  for (let i = 0; i <= maxCm; i++) {
    const x = 10 + i * pxPerCm;
    const tickH = (i % 5 === 0) ? 12 : 6;
    ctx.beginPath();
    ctx.moveTo(x, 20);
    ctx.lineTo(x, 20 - tickH);
    ctx.stroke();
    if (i % 2 === 0) {
      ctx.fillText(i + 'cm', x - 8, 35);
    }
  }
}

// ====== Download A4 ======
async function downloadA4() {
  const preview = document.getElementById('a4Preview');
  const btn = document.querySelector('.btn-download');
  btn.textContent = '⏳ 生成中...';
  btn.disabled = true;

  try {
    if (!window.html2canvas) {
      await loadScript('https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js');
    }

    const canvas = await html2canvas(preview, {
      scale: 2,
      backgroundColor: '#FFFFFF',
      useCORS: true,
      logging: false,
    });

    const link = document.createElement('a');
    link.download = `宝宝大小_${week}周_${new Date().toISOString().slice(0,10)}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    console.error(e);
    alert('下载失败，请截图保存');
  }

  btn.textContent = '⬇️ 下载图片';
  btn.disabled = false;
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}
