<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍼 宝宝真实大小 — B超尺寸可视化</title>
<style>
  :root {
    --pink: #FF6B9D;
    --pink-light: #FFF0F5;
    --blue: #7EC8E3;
    --bg: #FFF8FA;
    --text: #3D3D3D;
    --text-light: #888;
    --card-bg: #FFFFFF;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .header {
    text-align: center;
    padding: 40px 20px 20px;
    background: linear-gradient(135deg, var(--pink-light), #E8F6FD);
  }
  .header h1 {
    font-size: 28px;
    background: linear-gradient(135deg, var(--pink), #E876A0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .header p { color: var(--text-light); font-size: 15px; }

  .form-section { max-width: 520px; margin: 24px auto; padding: 0 16px; }
  .form-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; }
  .form-card h2 { font-size: 18px; margin-bottom: 16px; color: var(--pink); }
  .input-group { margin-bottom: 14px; }
  .input-group label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 14px; font-weight: 500; margin-bottom: 6px;
  }
  .input-group label .unit, .input-group label .full-name { color: var(--text-light); font-size: 12px; font-weight: normal; }
  .input-group input {
    width: 100%; padding: 10px 14px; border: 2px solid #F0F0F0;
    border-radius: 10px; font-size: 16px; outline: none; transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: var(--pink); }
  .input-group input::placeholder { color: #CCC; }
  .calc-btn {
    width: 100%; padding: 14px; background: linear-gradient(135deg, var(--pink), #E876A0);
    color: white; border: none; border-radius: 12px; font-size: 17px;
    font-weight: 600; cursor: pointer; margin-top: 8px; transition: transform 0.15s;
  }
  .calc-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,107,157,0.35); }
  .presets { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  .preset-btn {
    padding: 6px 12px; background: #F8F8F8; border: 1px solid #EEE;
    border-radius: 20px; font-size: 12px; cursor: pointer; color: var(--text-light); transition: all 0.2s;
  }
  .preset-btn:hover { background: var(--pink-light); color: var(--pink); border-color: var(--pink); }

  .result-section { max-width: 520px; margin: 0 auto; padding: 0 16px; display: none; }
  .result-section.show { display: block; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .info-card { background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow); padding: 16px; text-align: center; }
  .info-card .emoji { font-size: 28px; margin-bottom: 6px; }
  .info-card .value { font-size: 20px; font-weight: 700; color: var(--pink); }
  .info-card .label { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .comparison-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; text-align: center; margin-bottom: 16px; }
  .comparison-card .fruit-emoji { font-size: 64px; margin: 12px 0; animation: bounce 2s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .comparison-card .message { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
  .comparison-card .sub-msg { font-size: 14px; color: var(--text-light); }

  .fetus-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; text-align: center; margin-bottom: 16px; }
  .fetus-card h3 { font-size: 16px; color: var(--pink); margin-bottom: 12px; }
  .fetus-img-wrap { display: inline-block; background: #FAFAFA; border-radius: 12px; padding: 12px; }
  .fetus-img-wrap img { max-width: 280px; max-height: 280px; border-radius: 8px; display: block; }
  .ruler-info { margin-top: 10px; font-size: 13px; color: var(--text-light); }

  /* Print Preview */
  .a3-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
  .a3-card h3 { font-size: 16px; color: var(--pink); margin-bottom: 12px; text-align: center; }

  .a3-preview {
    background: white;
    border: 2px dashed #E0E0E0;
    border-radius: 8px;
    min-height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .a3-title {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: var(--pink);
    margin-bottom: 4px;
  }
  .a3-subtitle { text-align: center; font-size: 11px; color: var(--text-light); margin-bottom: 10px; }

  .a3-main {
    display: flex;
    gap: 10mm;
    align-items: flex-start;
  }

  /* Left: Ruler + Fetus image — uses REAL cm units */
  .a3-left {
    flex: 0 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 3mm;
  }

  /* Vertical ruler — each 1cm = 1cm real */
  .cm-ruler {
    width: 12mm;
    position: relative;
    flex-shrink: 0;
  }
  .cm-ruler .cm-tick {
    position: absolute;
    left: 0;
    width: 100%;
    height: 0;
    border-top: 0.5pt solid #888;
  }
  .cm-tick.major { border-top-color: #333; border-top-width: 1pt; }
  .cm-tick .cm-label {
    position: absolute;
    right: 100%;
    top: -4pt;
    font-size: 7pt;
    color: #333;
    padding-right: 1mm;
    white-space: nowrap;
  }

  /* Fetus image container — height = real cm */
  .fetus-real-size {
    position: relative;
    flex-shrink: 0;
  }
  .fetus-real-size img {
    width: auto;
    height: 100%;
    max-width: 60mm;
    object-fit: contain;
  }

  /* Right: info panel */
  .a3-right {
    flex: 1;
    min-width: 0;
  }
  .a3-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 4mm;
    margin-bottom: 6mm;
  }
  .a3-stat {
    background: #FFF5F8;
    border-radius: 4mm;
    padding: 3mm;
    text-align: center;
  }
  .a3-stat .sv { font-size: 14pt; font-weight: 700; color: var(--pink); }
  .a3-stat .sl { font-size: 8pt; color: var(--text-light); }

  .a3-compare {
    text-align: center;
    padding: 4mm;
    background: #FFF8FA;
    border-radius: 4mm;
    margin-bottom: 4mm;
  }
  .a3-compare .cf { font-size: 28pt; }
  .a3-compare .ct { font-size: 11pt; font-weight: 600; margin-top: 1mm; }

  .a3-dev {
    padding: 4mm;
    background: #F5FAFF;
    border-radius: 3mm;
    font-size: 9pt;
    line-height: 1.6;
    color: #555;
  }
  .a3-dev h4 { font-size: 9pt; color: var(--blue); margin-bottom: 1mm; }

  /* Horizontal ruler at bottom */
  .a3-h-ruler {
    margin-top: 8mm;
    border-top: 1pt solid #DDD;
    padding-top: 2mm;
  }
  .a3-h-ruler .h-ruler-label { font-size: 7pt; color: #999; text-align: center; margin-bottom: 1mm; }
  .h-ruler-bar {
    position: relative;
    height: 8mm;
    border-bottom: 1pt solid #666;
    margin: 0 5mm;
  }
  .h-ruler-bar .ht {
    position: absolute;
    bottom: 0;
    width: 0;
    border-left: 0.5pt solid #888;
  }
  .h-ruler-bar .ht.major { border-left-color: #333; border-left-width: 0.8pt; }
  .h-ruler-bar .ht .hl {
    position: absolute;
    top: 100%;
    left: -3mm;
    font-size: 6pt;
    color: #333;
    padding-top: 0.5mm;
  }

  .a3-footer {
    text-align: center;
    margin-top: 6mm;
    font-size: 7pt;
    color: #CCC;
    border-top: 0.5pt solid #EEE;
    padding-top: 2mm;
  }

  .action-btns { display: flex; gap: 12px; margin-top: 12px; }
  .action-btn {
    flex: 1; padding: 12px; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: transform 0.15s;
  }
  .action-btn:hover { transform: translateY(-1px); }
  .btn-download { background: linear-gradient(135deg, var(--pink), #E876A0); color: white; }
  .btn-print { background: var(--card-bg); color: var(--pink); border: 2px solid var(--pink) !important; }
  .footer { text-align: center; padding: 24px; font-size: 12px; color: #CCC; }

  /* Print: only baby image, no borders, no text */
  @media print {
    * { margin: 0 !important; padding: 0 !important; }
    body { background: white !important; }
    .header, .form-section, .result-section > *:not(#a3PrintCard), .action-btns, .footer,
    .a3-card h3, .no-print { display: none !important; }
    .result-section.show { display: block !important; }
    #a3PrintCard { box-shadow: none !important; }
    .a3-preview {
      border: none !important;
      min-height: auto !important;
      padding: 0 !important;
    }
    .a3-preview img {
      height: auto !important; /* let JS-set cm value pass through */
    }
    @page { size: A4 portrait; margin: 10mm; }
  }

  @media (max-width: 480px) {
    .header h1 { font-size: 22px; }
    .a3-preview { transform: scale(0.25); margin-bottom: -210mm; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🍼 宝宝真实大小</h1>
  <p>输入 B 超数据，看看你的宝宝有多大啦</p>
</div>

<div class="form-section">
  <div class="form-card">
    <h2>📋 B 超数据输入</h2>
    <div class="input-group">
      <label><span>双顶径 (BPD) <span class="full-name">胎头最宽</span></span><span class="unit">cm</span></label>
      <input type="number" id="bpd" placeholder="例如：5.0" step="0.1" min="1" max="12">
    </div>
    <div class="input-group">
      <label><span>头围 (HC) <span class="full-name">可选</span></span><span class="unit">cm</span></label>
      <input type="number" id="hc" placeholder="例如：18.0" step="0.1" min="5" max="40">
    </div>
    <div class="input-group">
      <label><span>腹围 (AC) <span class="full-name">可选</span></span><span class="unit">cm</span></label>
      <input type="number" id="ac" placeholder="例如：15.0" step="0.1" min="5" max="40">
    </div>
    <div class="input-group">
      <label><span>股骨长 (FL) <span class="full-name">大腿骨</span></span><span class="unit">cm</span></label>
      <input type="number" id="fl" placeholder="例如：3.5" step="0.1" min="0.5" max="10">
    </div>
    <button class="calc-btn" onclick="calculate()">🦞 看看宝宝有多大</button>
    <div class="presets">
      <span style="font-size:12px;color:#BBB;line-height:28px;">快速：</span>
      <button class="preset-btn" onclick="fillPreset(12)">12周</button>
      <button class="preset-btn" onclick="fillPreset(16)">16周</button>
      <button class="preset-btn" onclick="fillPreset(20)">20周</button>
      <button class="preset-btn" onclick="fillPreset(24)">24周</button>
      <button class="preset-btn" onclick="fillPreset(28)">28周</button>
      <button class="preset-btn" onclick="fillPreset(32)">32周</button>
      <button class="preset-btn" onclick="fillPreset(36)">36周</button>
      <button class="preset-btn" onclick="fillPreset(40)">40周</button>
    </div>
  </div>
</div>

<div class="result-section" id="resultSection">
  <div class="info-grid" id="infoGrid"></div>
  <div class="comparison-card" id="comparisonCard"></div>

  <div class="fetus-card">
    <h3>🎨 宝宝真实照片</h3>
    <div class="fetus-img-wrap">
      <img id="fetusImg" src="" alt="宝宝">
    </div>
    <div class="ruler-info" id="rulerInfo"></div>
  </div>

  <!-- A3 Print Area -->
  <div class="a3-card" id="a3PrintCard">
    <h3>📄 打印预览</h3>
    <div class="a3-preview" id="a3Preview"></div>
  </div>

  <div class="form-section">
    <div class="action-btns no-print">
      <button class="action-btn btn-download" onclick="downloadA3()">⬇️ 下载图片</button>
      <button class="action-btn btn-print" onclick="window.print()">🖨️ 打印 A3</button>
    </div>
  </div>
</div>

<div class="footer">🦞 宝宝真实大小 · 数据仅供参考 · 请以医生诊断为准</div>

<script>
const GROWTH_TABLE = [
  { week: 12, bpd: 2.0, hc: 7.0,  ac: 5.6,  fl: 0.8,  length: 9,   weight: 14 },
  { week: 13, bpd: 2.4, hc: 8.4,  ac: 6.7,  fl: 1.0,  length: 10,  weight: 23 },
  { week: 14, bpd: 2.8, hc: 10.0, ac: 8.0,  fl: 1.3,  length: 13,  weight: 43 },
  { week: 15, bpd: 3.2, hc: 11.5, ac: 9.3,  fl: 1.7,  length: 14,  weight: 70 },
  { week: 16, bpd: 3.5, hc: 12.8, ac: 10.5, fl: 2.0,  length: 16,  weight: 110 },
  { week: 17, bpd: 3.8, hc: 13.8, ac: 11.5, fl: 2.3,  length: 18,  weight: 150 },
  { week: 18, bpd: 4.2, hc: 15.0, ac: 12.8, fl: 2.6,  length: 20,  weight: 200 },
  { week: 19, bpd: 4.5, hc: 16.2, ac: 13.8, fl: 2.9,  length: 22,  weight: 240 },
  { week: 20, bpd: 4.9, hc: 17.5, ac: 15.0, fl: 3.3,  length: 25,  weight: 300 },
  { week: 21, bpd: 5.2, hc: 18.5, ac: 16.0, fl: 3.6,  length: 27,  weight: 380 },
  { week: 22, bpd: 5.5, hc: 19.5, ac: 17.0, fl: 3.9,  length: 28,  weight: 460 },
  { week: 23, bpd: 5.8, hc: 20.5, ac: 18.0, fl: 4.2,  length: 29,  weight: 540 },
  { week: 24, bpd: 6.0, hc: 21.5, ac: 19.0, fl: 4.5,  length: 30,  weight: 600 },
  { week: 25, bpd: 6.3, hc: 22.5, ac: 20.0, fl: 4.7,  length: 32,  weight: 700 },
  { week: 26, bpd: 6.6, hc: 23.3, ac: 21.0, fl: 4.9,  length: 34,  weight: 800 },
  { week: 27, bpd: 6.8, hc: 24.0, ac: 21.8, fl: 5.2,  length: 35,  weight: 950 },
  { week: 28, bpd: 7.1, hc: 25.0, ac: 22.8, fl: 5.4,  length: 37,  weight: 1100 },
  { week: 29, bpd: 7.3, hc: 25.8, ac: 23.6, fl: 5.6,  length: 38,  weight: 1250 },
  { week: 30, bpd: 7.6, hc: 26.6, ac: 24.5, fl: 5.8,  length: 39,  weight: 1400 },
  { week: 31, bpd: 7.8, hc: 27.3, ac: 25.3, fl: 6.0,  length: 40,  weight: 1600 },
  { week: 32, bpd: 8.0, hc: 28.0, ac: 26.0, fl: 6.2,  length: 42,  weight: 1800 },
  { week: 33, bpd: 8.2, hc: 28.7, ac: 26.8, fl: 6.4,  length: 43,  weight: 2000 },
  { week: 34, bpd: 8.5, hc: 29.5, ac: 27.5, fl: 6.6,  length: 44,  weight: 2250 },
  { week: 35, bpd: 8.7, hc: 30.2, ac: 28.2, fl: 6.7,  length: 45,  weight: 2500 },
  { week: 36, bpd: 8.8, hc: 30.7, ac: 29.0, fl: 6.9,  length: 47,  weight: 2700 },
  { week: 37, bpd: 9.0, hc: 31.2, ac: 29.8, fl: 7.1,  length: 48,  weight: 2950 },
  { week: 38, bpd: 9.2, hc: 31.7, ac: 30.5, fl: 7.2,  length: 49,  weight: 3100 },
  { week: 39, bpd: 9.4, hc: 32.2, ac: 31.2, fl: 7.3,  length: 50,  weight: 3300 },
  { week: 40, bpd: 9.5, hc: 32.8, ac: 32.0, fl: 7.5,  length: 51,  weight: 3400 },
];

const FETUS_IMAGES = [
  { maxWeek: 16, src: 'images/fetus_12w.png' },
  { maxWeek: 24, src: 'images/fetus_20w.png' },
  { maxWeek: 32, src: 'images/fetus_28w.png' },
  { maxWeek: 99, src: 'images/fetus_36w.png' },
];

const COMPARISONS = [
  { maxLen: 2,  emoji: '🫘', name: '一颗小豆子', msg: '宝宝还是一颗小豆子呢～' },
  { maxLen: 3,  emoji: '🫐', name: '一颗蓝莓', msg: '你的宝宝像一颗蓝莓那么大！' },
  { maxLen: 5,  emoji: '🍓', name: '一颗草莓', msg: '你的宝宝像一颗草莓！' },
  { maxLen: 7,  emoji: '🍑', name: '一颗小桃子', msg: '你的宝宝像一颗小桃子～' },
  { maxLen: 10, emoji: '🥝', name: '一个猕猴桃', msg: '你的宝宝像一个猕猴桃！' },
  { maxLen: 14, emoji: '🍋', name: '一个柠檬', msg: '你的宝宝像一个柠檬！' },
  { maxLen: 18, emoji: '🥑', name: '一个牛油果', msg: '你的宝宝像一个牛油果！' },
  { maxLen: 22, emoji: '🥭', name: '一个小芒果', msg: '你的宝宝像一个小芒果！' },
  { maxLen: 26, emoji: '🌽', name: '一根玉米', msg: '你的宝宝像一根玉米那么长！' },
  { maxLen: 30, emoji: '🍌', name: '一根大香蕉', msg: '你的宝宝像一根大香蕉！' },
  { maxLen: 35, emoji: '🍆', name: '一根茄子', msg: '你的宝宝像一根茄子！' },
  { maxLen: 39, emoji: '🍍', name: '一个菠萝', msg: '你的宝宝像一个菠萝！' },
  { maxLen: 43, emoji: '🍈', name: '一个哈密瓜', msg: '你的宝宝像一个哈密瓜那么大！' },
  { maxLen: 47, emoji: '🥥', name: '一个椰子', msg: '你的宝宝像一个椰子！' },
  { maxLen: 51, emoji: '🍉', name: '一个小西瓜', msg: '你的宝宝快像一个小西瓜啦！' },
  { maxLen: 99, emoji: '🎃', name: '一个大南瓜', msg: '你的宝宝已经很大啦！' },
];

function fillPreset(week) {
  const d = GROWTH_TABLE.find(d => d.week === week);
  if (!d) return;
  document.getElementById('bpd').value = d.bpd;
  document.getElementById('hc').value = d.hc;
  document.getElementById('ac').value = d.ac;
  document.getElementById('fl').value = d.fl;
  calculate();
}

function calculate() {
  const bpd = parseFloat(document.getElementById('bpd').value);
  const hc = parseFloat(document.getElementById('hc').value);
  const ac = parseFloat(document.getElementById('ac').value);
  const fl = parseFloat(document.getElementById('fl').value);
  if (!bpd || bpd <= 0) { alert('请输入双顶径（BPD）！'); return; }

  const r = estimateWeek(bpd, fl, hc, ac);
  const comp = getComparison(r.length);
  const fetusImg = getFetusImage(r.week);
  showResults(r, comp, fetusImg, bpd, hc, ac, fl);
}

function estimateWeek(bpd, fl, hc, ac) {
  let bestDiff = Infinity, best = GROWTH_TABLE[0];
  for (const e of GROWTH_TABLE) {
    const d = Math.abs(e.bpd - bpd);
    if (d < bestDiff) { bestDiff = d; best = e; }
  }
  let length = best.length;
  let weight = best.weight;
  if (fl > 0) length = Math.round((length + fl * 7) / 2);
  if (hc && ac && fl) {
    const logW = 1.326 + 0.0107*hc + 0.0438*ac + 0.158*fl - 0.00326*ac*fl;
    weight = Math.round(Math.pow(10, logW));
  }
  return { week: best.week, length, weight };
}

function getComparison(length) {
  for (const c of COMPARISONS) if (length <= c.maxLen) return c;
  return COMPARISONS[COMPARISONS.length - 1];
}

function getFetusImage(week) {
  for (const img of FETUS_IMAGES) if (week <= img.maxWeek) return img;
  return FETUS_IMAGES[FETUS_IMAGES.length - 1];
}

function showResults(r, comp, fetusImg, bpd, hc, ac, fl) {
  const section = document.getElementById('resultSection');
  section.classList.add('show');
  const wk = Math.round(r.week);
  const ws = r.weight >= 1000 ? (r.weight/1000).toFixed(1)+' kg' : r.weight+' g';

  document.getElementById('infoGrid').innerHTML = `
    <div class="info-card"><div class="emoji">📅</div><div class="value">${wk}周</div><div class="label">估计孕周</div></div>
    <div class="info-card"><div class="emoji">📏</div><div class="value">${r.length} cm</div><div class="label">估计身长</div></div>
    <div class="info-card"><div class="emoji">⚖️</div><div class="value">${ws}</div><div class="label">估计体重</div></div>
    <div class="info-card"><div class="emoji">${comp.emoji}</div><div class="value">${comp.name}</div><div class="label">真实大小参照</div></div>`;

  document.getElementById('comparisonCard').innerHTML = `
    <div class="fruit-emoji">${comp.emoji}</div>
    <div class="message">${comp.msg}</div>
    <div class="sub-msg">身长约 ${r.length} cm，体重约 ${ws}</div>`;

  document.getElementById('fetusImg').src = fetusImg.src;
  document.getElementById('rulerInfo').textContent = `孕 ${wk} 周 · 约 ${r.length} cm`;

  generateA3(wk, r.length, r.weight, comp, bpd, hc, ac, fl, fetusImg);
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ====== Print: baby image only, 1:1 real size ======
function generateA3(week, length, weight, comp, bpd, hc, ac, fl, fetusImg) {
  const preview = document.getElementById('a3Preview');

  // Height in cm — print will render CSS cm as real cm
  const imgH = Math.min(length, 25);

  preview.innerHTML = `
    <div style="display:flex; align-items:center; justify-content:center; width:100%; height:100%;">
      <img src="${fetusImg.src}" alt="胎儿"
           style="height:${imgH}cm; width:auto; object-fit:contain; display:block;">
    </div>`;
}

// ====== Download ======
async function downloadA3() {
  const preview = document.getElementById('a3Preview');
  const btn = document.querySelector('.btn-download');
  btn.textContent = '⏳ 生成中...';
  btn.disabled = true;
  try {
    if (!window.html2canvas) {
      await new Promise((res,rej) => {
        const s = document.createElement('script');
        s.src = 'html2canvas.min.js';
        s.onload = res; s.onerror = () => rej(new Error('html2canvas加载失败')); document.head.appendChild(s);
      });
    }
    const canvas = await html2canvas(preview, {
      scale: 2, backgroundColor: '#FFFFFF', useCORS: true, logging: false,
    });

    const link = document.createElement('a');
    link.download = `宝宝大小_${new Date().toISOString().slice(0,10)}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    console.error(e);
    alert('下载失败，请截图保存');
  }
  btn.textContent = '⬇️ 下载图片';
  btn.disabled = false;
}
